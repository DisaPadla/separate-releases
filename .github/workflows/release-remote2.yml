name: Release Remote App 2

on:
  push:
    tags:
      - 'remote2-v*'

permissions:
  contents: write

jobs:
  release-remote2:
    name: Build & Release Remote2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Remote2 app
        run: npx nx build remote2 --configuration=production

      - name: Archive build artifact
        run: |
          cd apps/remote2/dist
          tar -czf ../../../remote2-${{ github.ref_name }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Remote App 2 ${{ github.ref_name }}"
          body: |
            ## Remote App 2 Release ${{ github.ref_name }}

            The Analytics Dashboard micro-frontend application.

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Deployment
            Extract the archive and serve the `dist/` folder. The `remoteEntry.js` file must be accessible
            at the URL configured in the shell's `module-federation.manifest.json`.
          files: remote2-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
