name: Release Shell App

on:
  push:
    tags:
      - 'shell-v*'

permissions:
  contents: write

jobs:
  release-shell:
    name: Build & Release Shell
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Shell app
        run: npx nx build shell --configuration=production

      - name: Archive build artifact
        run: |
          cd apps/shell/dist
          tar -czf ../../../shell-${{ github.ref_name }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Shell App ${{ github.ref_name }}"
          body: |
            ## Shell App Release ${{ github.ref_name }}

            The host (shell) application for the micro-frontend platform.

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Deployment
            Extract the archive and serve the `dist/` folder from a static file server or CDN.
          files: shell-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
