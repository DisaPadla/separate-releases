name: Release Remote App 1

on:
  push:
    tags:
      - 'remote1-v*'

permissions:
  contents: write

jobs:
  release-remote1:
    name: Build & Release Remote1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Remote1 app
        run: npx nx build remote1 --configuration=production

      - name: Archive build artifact
        run: |
          cd apps/remote1/dist
          tar -czf ../../../remote1-${{ github.ref_name }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Remote App 1 ${{ github.ref_name }}"
          body: |
            ## Remote App 1 Release ${{ github.ref_name }}

            The Products Catalogue micro-frontend application.

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Deployment
            Extract the archive and serve the `dist/` folder. The `remoteEntry.js` file must be accessible
            at the URL configured in the shell's `module-federation.manifest.json`.
          files: remote1-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
