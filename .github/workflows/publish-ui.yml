name: Publish UI Library

on:
  push:
    tags:
      - 'ui-v*'

permissions:
  contents: write
  packages: write

jobs:
  publish-ui:
    name: Build & Publish @monorepo/ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build UI library
        run: npx nx build ui

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#ui-v}" >> "$GITHUB_OUTPUT"

      - name: Prepare dist for publishing
        run: |
          # Copy package.json into dist so npm publish works correctly
          cp libs/ui/package.json libs/ui/dist/package.json
          # Set the version from the tag
          cd libs/ui/dist
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
        working-directory: libs/ui/dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "@monorepo/ui ${{ github.ref_name }}"
          body: |
            ## @monorepo/ui Release ${{ github.ref_name }}

            Published to npm as `@monorepo/ui@${{ steps.version.outputs.version }}`.

            ### Components
            - `Button` — versatile button with primary / secondary / danger variants
            - `Card` — content card with title, description, body and footer slots
            - `Header` — page header with gradient background and action slot
            - `NavLink` — router-aware navigation link with active styling

            ### Install
            ```bash
            npm install @monorepo/ui
            ```
          generate_release_notes: true
