name: Release

on:
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Deploy
    if: github.event.label.name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm i

      - name: Determine affected apps
        id: affected
        run: |
          AFFECTED=$(npx nx show projects --affected --base=origin/main --head=HEAD --type=app 2>/dev/null | tr '\n' ' ' | xargs || echo "")
          echo "apps=${AFFECTED}" >> "$GITHUB_OUTPUT"
          echo "Affected apps: ${AFFECTED}"

      - name: Bump versions for affected apps
        id: versions
        run: |
          APPS="${{ steps.affected.outputs.apps }}"

          for app in shell remote1 remote2; do
            PKG="apps/${app}/package.json"
            CURRENT=$(node -p "require('./${PKG}').version")

            if echo "$APPS" | grep -qw "$app"; then
              IFS='.' read -r major minor patch <<< "$CURRENT"
              NEW_VERSION="${major}.${minor}.$((patch + 1))"
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${PKG}', 'utf8'));
                pkg.version = '${NEW_VERSION}';
                fs.writeFileSync('${PKG}', JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "${app} bumped: ${CURRENT} -> ${NEW_VERSION}"
            else
              echo "${app} not affected, keeping ${CURRENT}"
            fi
          done

          SHELL_VERSION=$(node -p "require('./apps/shell/package.json').version")
          REMOTE1_VERSION=$(node -p "require('./apps/remote1/package.json').version")
          REMOTE2_VERSION=$(node -p "require('./apps/remote2/package.json').version")

          echo "shell_version=${SHELL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "remote1_version=${REMOTE1_VERSION}" >> "$GITHUB_OUTPUT"
          echo "remote2_version=${REMOTE2_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bumps to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/*/package.json
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump versions [skip ci]

          shell: ${{ steps.versions.outputs.shell_version }}
          remote1: ${{ steps.versions.outputs.remote1_version }}
          remote2: ${{ steps.versions.outputs.remote2_version }}"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Build all apps
        run: |
          npx nx run-many -t build --projects=shell,remote1,remote2 --configuration=production --parallel=3 --baseHref=./

      - name: Prepare deployment
        run: |
          mkdir -p _site/remote1/${{ steps.versions.outputs.remote1_version }}
          mkdir -p _site/remote2/${{ steps.versions.outputs.remote2_version }}
          mkdir -p _site/shell/${{ steps.versions.outputs.shell_version }}

          cp -r apps/remote1/dist/* _site/remote1/${{ steps.versions.outputs.remote1_version }}/
          cp -r apps/remote2/dist/* _site/remote2/${{ steps.versions.outputs.remote2_version }}/
          cp -r apps/shell/dist/* _site/shell/${{ steps.versions.outputs.shell_version }}/

          # Create root index.html that redirects to latest shell
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          cat > _site/index.html <<'HTMLEOF'
<!DOCTYPE html>
<html>
  <head>
    <meta id="redirect" http-equiv="refresh" content="" />
  </head>
  <body>
    <p>Redirecting to Shell App...</p>
  </body>
</html>
HTMLEOF
          sed -i "s|content=\"\"|content=\"0;url=shell/${{ steps.versions.outputs.shell_version }}/\"|" _site/index.html

      - name: Generate versions.json manifest
        run: |
          REMOTE1_ALL=$(ls -d _site/remote1/*/ 2>/dev/null | xargs -I{} basename {} | sort -V | jq -R . | jq -s .)
          REMOTE2_ALL=$(ls -d _site/remote2/*/ 2>/dev/null | xargs -I{} basename {} | sort -V | jq -R . | jq -s .)
          SHELL_ALL=$(ls -d _site/shell/*/ 2>/dev/null | xargs -I{} basename {} | sort -V | jq -R . | jq -s .)

          jq -n \
            --arg sv "${{ steps.versions.outputs.shell_version }}" \
            --arg r1v "${{ steps.versions.outputs.remote1_version }}" \
            --arg r2v "${{ steps.versions.outputs.remote2_version }}" \
            --argjson sa "$SHELL_ALL" \
            --argjson r1a "$REMOTE1_ALL" \
            --argjson r2a "$REMOTE2_ALL" \
            '{latest:{shell:$sv,remote1:$r1v,remote2:$r2v},available:{shell:$sa,remote1:$r1a,remote2:$r2a}}' \
            > _site/versions.json
          cat _site/versions.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
