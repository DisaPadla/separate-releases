name: Release

on:
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Deploy
    if: github.event.label.name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm i

      - name: Determine affected apps
        id: affected
        run: |
          AFFECTED=$(npx nx show projects --affected --base=origin/main --head=HEAD --type=app 2>/dev/null || echo "")
          echo "apps=${AFFECTED}" >> "$GITHUB_OUTPUT"
          echo "Affected apps: ${AFFECTED}"

      - name: Bump versions for affected apps
        id: versions
        run: |
          APPS="${{ steps.affected.outputs.apps }}"

          for app in shell remote1 remote2; do
            PKG="apps/${app}/package.json"
            CURRENT=$(node -p "require('./${PKG}').version")

            if echo "$APPS" | grep -qw "$app"; then
              IFS='.' read -r major minor patch <<< "$CURRENT"
              NEW_VERSION="${major}.${minor}.$((patch + 1))"
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${PKG}', 'utf8'));
                pkg.version = '${NEW_VERSION}';
                fs.writeFileSync('${PKG}', JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "${app} bumped: ${CURRENT} -> ${NEW_VERSION}"
            else
              echo "${app} not affected, keeping ${CURRENT}"
            fi
          done

          SHELL_VERSION=$(node -p "require('./apps/shell/package.json').version")
          REMOTE1_VERSION=$(node -p "require('./apps/remote1/package.json').version")
          REMOTE2_VERSION=$(node -p "require('./apps/remote2/package.json').version")

          echo "shell_version=${SHELL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "remote1_version=${REMOTE1_VERSION}" >> "$GITHUB_OUTPUT"
          echo "remote2_version=${REMOTE2_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bumps to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/*/package.json
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump versions [skip ci]

          shell: ${{ steps.versions.outputs.shell_version }}
          remote1: ${{ steps.versions.outputs.remote1_version }}
          remote2: ${{ steps.versions.outputs.remote2_version }}"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Build all apps
        run: npx nx run-many -t build --projects=shell,remote1,remote2 --configuration=production --parallel=3

      - name: Prepare deployment
        run: |
          mkdir -p _site/remote1/${{ steps.versions.outputs.remote1_version }}
          mkdir -p _site/remote2/${{ steps.versions.outputs.remote2_version }}
          mkdir -p _site/shell/${{ steps.versions.outputs.shell_version }}

          cp -r apps/remote1/dist/* _site/remote1/${{ steps.versions.outputs.remote1_version }}/
          cp -r apps/remote2/dist/* _site/remote2/${{ steps.versions.outputs.remote2_version }}/
          cp -r apps/shell/dist/* _site/shell/${{ steps.versions.outputs.shell_version }}/

      - name: Merge with existing gh-pages
        run: |
          if git fetch origin gh-pages 2>/dev/null; then
            git worktree add _prev origin/gh-pages
            for app in remote1 remote2 shell; do
              if [ -d "_prev/${app}" ]; then
                for ver_dir in _prev/${app}/*/; do
                  ver=$(basename "$ver_dir")
                  if [ ! -d "_site/${app}/${ver}" ] && [ "$ver" != "*" ]; then
                    cp -r "$ver_dir" "_site/${app}/${ver}"
                  fi
                done
              fi
            done
            git worktree remove _prev
          fi

      - name: Generate versions.json manifest
        run: |
          REMOTE1_ALL=$(ls -d _site/remote1/*/ 2>/dev/null | xargs -I{} basename {} | sort -V | jq -R . | jq -s .)
          REMOTE2_ALL=$(ls -d _site/remote2/*/ 2>/dev/null | xargs -I{} basename {} | sort -V | jq -R . | jq -s .)
          SHELL_ALL=$(ls -d _site/shell/*/ 2>/dev/null | xargs -I{} basename {} | sort -V | jq -R . | jq -s .)

          cat > _site/versions.json <<EOF
          {
            "latest": {
              "shell": "${{ steps.versions.outputs.shell_version }}",
              "remote1": "${{ steps.versions.outputs.remote1_version }}",
              "remote2": "${{ steps.versions.outputs.remote2_version }}"
            },
            "available": {
              "shell": ${SHELL_ALL},
              "remote1": ${REMOTE1_ALL},
              "remote2": ${REMOTE2_ALL}
            }
          }
          EOF
          cat _site/versions.json

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
